<!DOCTYPE html>
<html>
<head>
    <title>Configuración Invernadero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 40px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 15px 25px;
            margin: 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Configuración del Sistema</h2>
    <p>Seleccione una opción:</p>

    <button class="btn-primary" onclick="conozcoRed()">Conozco la red actual</button>
    <br>
    <button class="btn-secondary" onclick="noConozcoRed()">No conozco la red</button>
</div>

<script>
function conozcoRed() {
    window.location.href = "http://invernadero.local";
}

function noConozcoRed() {
    alert("1️⃣ Espere hasta que aparezca la red INVERNADERO_XXXX.\n\n2️⃣ Conéctese con contraseña: 12345678\n\n3️⃣ Luego abra en su navegador: http://192.168.4.1");
}
</script>

</body>
</html>
